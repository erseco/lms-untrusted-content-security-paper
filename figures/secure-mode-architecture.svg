<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="rArrow" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c0392b"/>
    </marker>
    <marker id="gArrowA" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1e8449"/>
    </marker>
    <marker id="gArrowB" markerWidth="9" markerHeight="9" refX="2" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 z" fill="#1e8449"/>
    </marker>
  </defs>

  <!-- ===================== (a) LEGACY: broken cage ===================== -->
  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A3E6E">(a) Legacy — same origin (escapes the cage)</text>

  <rect x="24" y="42" width="452" height="300" rx="10" fill="#f5f7fa" stroke="#1A3E6E" stroke-width="1.5"/>
  <text x="40" y="66" font-size="13" font-weight="bold" fill="#1A3E6E">LMS authenticated page</text>
  <text x="40" y="84" font-size="12" fill="#475569">origin: https://lms</text>

  <!-- sesskey token -->
  <rect x="300" y="52" width="160" height="28" rx="14" fill="#f6e7c1" stroke="#b7791f" stroke-width="1.2"/>
  <text x="380" y="71" text-anchor="middle" font-size="12.5" fill="#7a4f10" font-weight="bold">M.cfg.sesskey</text>

  <!-- iframe = a broken cage: red border with a GAP at the top where the JS escapes -->
  <rect x="48" y="118" width="404" height="178" fill="#ffffff"/>
  <line x1="48"  y1="118" x2="296" y2="118" stroke="#c0392b" stroke-width="1.7"/>
  <line x1="364" y1="118" x2="452" y2="118" stroke="#c0392b" stroke-width="1.7"/>
  <line x1="452" y1="118" x2="452" y2="296" stroke="#c0392b" stroke-width="1.7"/>
  <line x1="48"  y1="296" x2="452" y2="296" stroke="#c0392b" stroke-width="1.7"/>
  <line x1="48"  y1="118" x2="48"  y2="296" stroke="#c0392b" stroke-width="1.7"/>
  <text x="62" y="140" font-size="12" fill="#334155">iframe · sandbox: allow-scripts <tspan font-weight="bold" fill="#c0392b">allow-same-origin</tspan></text>
  <text x="62" y="158" font-size="12" fill="#334155">origin = https://lms — <tspan font-weight="bold" fill="#c0392b">no real isolation</tspan></text>

  <!-- open padlock (red) straddling the gap: the cage is unlocked -->
  <path d="M324,108 v-6 a8,8 0 0 1 16,-5" fill="none" stroke="#c0392b" stroke-width="2.4"/>
  <rect x="320" y="108" width="22" height="15" rx="2.5" fill="#c0392b"/>
  <circle cx="331" cy="115" r="2" fill="#fff"/>

  <!-- author JS -->
  <rect x="70" y="200" width="150" height="58" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.3"/>
  <text x="145" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">author JS</text>
  <text x="145" y="244" text-anchor="middle" font-size="11" fill="#a93226">(untrusted)</text>

  <!-- escape arrow: out THROUGH the gap, up to the sesskey -->
  <path d="M210,205 C268,196 300,150 360,86" fill="none" stroke="#c0392b" stroke-width="2.4" marker-end="url(#rArrow)"/>
  <text x="232" y="186" font-size="11.5" fill="#c0392b" font-weight="bold">escapes &#8594; reads sesskey + parent DOM</text>

  <text x="40" y="324" font-size="12.5" fill="#c0392b" font-weight="bold">&#8594; forges an authenticated request</text>
  <text x="40" y="340" font-size="11.5" fill="#a93226">(bounded by the viewer's role)</text>

  <!-- ===================== (b) SECURE: locked cage ===================== -->
  <text x="750" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A3E6E">(b) Secure — opaque origin + bridge (contained)</text>

  <rect x="524" y="42" width="452" height="300" rx="10" fill="#f5f7fa" stroke="#1A3E6E" stroke-width="1.5"/>
  <text x="540" y="66" font-size="13" font-weight="bold" fill="#1A3E6E">LMS authenticated page</text>
  <text x="540" y="84" font-size="12" fill="#475569">origin: https://lms</text>

  <rect x="792" y="52" width="170" height="28" rx="14" fill="#e7f4ec" stroke="#1e8449" stroke-width="1.2"/>
  <text x="877" y="71" text-anchor="middle" font-size="12" fill="#14532d" font-weight="bold">sesskey stays in parent</text>

  <!-- iframe = an intact cage: solid green border -->
  <rect x="548" y="118" width="404" height="178" rx="2" fill="#ffffff" stroke="#1e8449" stroke-width="2"/>
  <text x="562" y="140" font-size="12" fill="#334155">iframe · sandbox: allow-scripts <tspan font-weight="bold" fill="#1e8449">(no allow-same-origin)</tspan></text>
  <text x="562" y="158" font-size="12" fill="#334155">origin = <tspan font-weight="bold">null</tspan> (opaque) — <tspan font-weight="bold" fill="#1e8449">isolated</tspan></text>

  <!-- closed padlock (green) on the top border: the cage is locked -->
  <path d="M742,108 v-6 a8,8 0 0 1 16,0 v6" fill="none" stroke="#1e8449" stroke-width="2.4"/>
  <rect x="739" y="108" width="22" height="15" rx="2.5" fill="#1e8449"/>
  <circle cx="750" cy="115" r="2" fill="#fff"/>

  <!-- author JS (contained) -->
  <rect x="570" y="200" width="150" height="58" rx="6" fill="#eef2f7" stroke="#475569" stroke-width="1.3"/>
  <text x="645" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">author JS</text>
  <text x="645" y="244" text-anchor="middle" font-size="11" fill="#64748b">(contained)</text>

  <!-- blocked parent read: dashed arrow crossed out at the opaque boundary -->
  <path d="M722,205 C758,182 786,156 806,130" fill="none" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="5 4"/>
  <line x1="797" y1="111" x2="819" y2="133" stroke="#c0392b" stroke-width="2.8"/>
  <line x1="819" y1="111" x2="797" y2="133" stroke="#c0392b" stroke-width="2.8"/>
  <text x="792" y="100" text-anchor="end" font-size="11.5" fill="#c0392b" font-weight="bold">parent read &#8594; SecurityError</text>

  <!-- validated bridge: the only sanctioned channel -->
  <path d="M724,238 C800,252 850,252 905,238" fill="none" stroke="#1e8449" stroke-width="2" marker-end="url(#gArrowA)" marker-start="url(#gArrowB)"/>
  <text x="612" y="284" font-size="11.5" fill="#1e8449">validated postMessage: window identity + nonce + {ready, track}</text>

  <text x="540" y="324" font-size="12.5" fill="#1e8449" font-weight="bold">&#8594; isolated; SCORM tracking preserved</text>
  <text x="540" y="340" font-size="11.5" fill="#14532d">CSP response: &#8230;; sandbox allow-scripts allow-popups allow-forms</text>
</svg>
