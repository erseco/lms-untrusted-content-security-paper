<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="gA" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#1e8449"/></marker>
    <marker id="bA" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#1A3E6E"/></marker>
    <marker id="dA" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker>
    <marker id="dB" markerWidth="9" markerHeight="9" refX="2" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#64748b"/></marker>
  </defs>

  <!-- LMS page -->
  <rect x="24" y="40" width="952" height="396" rx="10" fill="#f5f7fa" stroke="#1A3E6E" stroke-width="1.5"/>
  <text x="42" y="66" font-size="13" font-weight="bold" fill="#1A3E6E">LMS authenticated page</text>
  <text x="42" y="84" font-size="12" fill="#475569">origin: https://lms</text>

  <!-- content iframe (opaque) -->
  <rect x="48" y="100" width="384" height="312" rx="3" fill="#ffffff" stroke="#1e8449" stroke-width="2"/>
  <text x="62" y="124" font-size="12" fill="#334155">content iframe · sandbox <tspan font-weight="bold" fill="#1e8449">(no allow-same-origin)</tspan></text>
  <text x="62" y="142" font-size="12" fill="#334155">origin = <tspan font-weight="bold">null</tspan> (opaque)</text>

  <!-- placeholder where the video would be -->
  <rect x="78" y="170" width="324" height="210" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 4"/>
  <circle cx="240" cy="250" r="26" fill="#cbd5e1"/>
  <path d="M232,236 L232,264 L256,250 Z" fill="#ffffff"/>
  <text x="240" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">external-video placeholder</text>
  <text x="240" y="326" text-anchor="middle" font-size="11" fill="#64748b">(geometry only — the opaque iframe</text>
  <text x="240" y="342" text-anchor="middle" font-size="11" fill="#64748b">cannot load the cross-origin player)</text>

  <!-- parent relay (outside the sandbox) -->
  <rect x="560" y="96" width="392" height="98" rx="8" fill="#eef2fb" stroke="#1A3E6E" stroke-width="1.5"/>
  <text x="576" y="122" font-size="13" font-weight="bold" fill="#1A3E6E">Parent relay (exe_embed_relay.js)</text>
  <text x="576" y="140" font-size="11.5" fill="#475569">— outside the sandbox —</text>
  <text x="576" y="164" font-size="11.5" fill="#334155">validates: <tspan font-weight="bold">https + cross-origin to the LMS</tspan> → promote</text>

  <!-- real cross-origin player -->
  <rect x="596" y="248" width="320" height="128" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.8"/>
  <circle cx="660" cy="300" r="22" fill="#d97706"/>
  <path d="M653,288 L653,312 L674,300 Z" fill="#ffffff"/>
  <text x="700" y="294" font-size="12.5" font-weight="bold" fill="#9a3412">Real player iframe</text>
  <text x="700" y="312" font-size="11.5" fill="#7c2d12">youtube.com (cross-origin)</text>
  <text x="700" y="330" font-size="11.5" font-weight="bold" fill="#1e8449">SOP-isolated from the LMS</text>

  <!-- arrows -->
  <path d="M404,210 C470,180 510,160 558,150" fill="none" stroke="#1e8449" stroke-width="1.9" marker-end="url(#gA)"/>
  <text x="412" y="190" font-size="11.5" fill="#1e8449" font-weight="bold">postMessage: provider URL + geometry</text>

  <path d="M752,196 L752,246" fill="none" stroke="#1A3E6E" stroke-width="1.9" marker-end="url(#bA)"/>
  <text x="762" y="226" font-size="11.5" fill="#1A3E6E">promotes + overlays</text>

  <path d="M594,312 L406,288" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#dA)" marker-start="url(#dB)"/>
  <text x="500" y="356" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">overlaid in place (same geometry)</text>

  <text x="48" y="406" font-size="11.5" fill="#334155">The promoted player is <tspan font-weight="bold">cross-origin</tspan>, so it cannot read the LMS (SOP) — the trust model Moodle already uses to embed YouTube.</text>
</svg>
