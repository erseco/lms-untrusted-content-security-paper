<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Promoting a cross-origin media embed from an opaque sandbox</title>
  <desc id="desc">The promoted player is cross-origin: it cannot read LMS state under SOP.</desc>
  
  <defs>
    <style>
      .bg{fill:#fff}
      .frame{fill:#ffffff;stroke:#8a97a8;stroke-width:1.6}
      .panel{fill:#f7f8fa;stroke:#8a97a8;stroke-width:1.4}
      .lms{fill:#edf3f9;stroke:#234a73;stroke-width:1.7}
      .risk{fill:#fbefee;stroke:#9d2f2c;stroke-width:1.8}
      .safe{fill:#edf6f0;stroke:#2f6846;stroke-width:1.8}
      .media{fill:#fff4e2;stroke:#9a5b16;stroke-width:1.8}
      .ghost{fill:#f3f5f8;stroke:#8a97a8;stroke-width:1.4;stroke-dasharray:8 6}
      .title{font-family:Georgia,'Times New Roman',serif;font-size:31px;font-weight:700;fill:#172033}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#536174}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#172033}
      .hSmall{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;fill:#172033}
      .text{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#172033}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:15.5px;fill:#536174}
      .mono{font-family:Menlo,Consolas,monospace;font-size:15px;fill:#172033}
      .riskText{fill:#9d2f2c}
      .safeText{fill:#2f6846}
      .blueText{fill:#234a73}
      .amberText{fill:#9a5b16}
      .line{stroke:#8a97a8;stroke-width:2;fill:none}
      .arrowBlue{stroke:#234a73;stroke-width:2.2;fill:none}
      .arrowGreen{stroke:#2f6846;stroke-width:2.2;fill:none}
      .arrowGray{stroke:#8a97a8;stroke-width:1.8;fill:none;stroke-dasharray:7 6}
      .icon{fill:none;stroke:#172033;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
      .iconSafe{fill:none;stroke:#2f6846;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
      .iconRisk{fill:none;stroke:#9d2f2c;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
      .pill{fill:#e8edf3;stroke:#c5ced8;stroke-width:1}
      .pillText{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#172033}
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#234a73"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2f6846"/></marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8a97a8"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="title" x="600" y="52" text-anchor="middle">Promoting a cross-origin media embed from an opaque sandbox</text>

  <rect class="frame" x="44" y="84" width="1112" height="468" rx="12"/>
  <text class="hSmall blueText" x="72" y="122">LMS authenticated page</text>
  <text class="small" x="72" y="148">origin https://lms</text>

  <rect class="safe" x="82" y="184" width="422" height="300" rx="9"/>
  <text class="hSmall safeText" x="106" y="220">Content iframe</text>
  <text class="small" x="106" y="248">sandbox without allow-same-origin</text>
  <text class="small" x="106" y="272">origin = null (opaque)</text>
  <rect class="ghost" x="126" y="306" width="334" height="130" rx="8"/>
  <circle cx="214" cy="371" r="28" fill="#c8d1dc"/>
  <path d="M205 354L205 388L234 371Z" fill="#fff"/>
  <text class="hSmall" x="310" y="352" text-anchor="middle">External-video placeholder</text>
  <text class="small" x="310" y="382" text-anchor="middle">geometry only</text>
<text class="small" x="310" y="404" text-anchor="middle">the opaque iframe cannot load</text>
<text class="small" x="310" y="426" text-anchor="middle">the cross-origin player</text>

  <rect class="lms" x="690" y="164" width="372" height="158" rx="9"/>
  <text class="hSmall blueText" x="720" y="208">Parent relay</text>
  <text class="mono" x="720" y="234">exe_embed_relay.js</text>
  <text class="small" x="720" y="264" text-anchor="start">outside the sandbox</text>
<text class="small" x="720" y="286" text-anchor="start">validates https and cross-origin</text>
<text class="small" x="720" y="308" text-anchor="start">then promotes the embed</text>

  <rect class="media" x="708" y="386" width="334" height="118" rx="9"/>
  <circle cx="764" cy="445" r="27" fill="#9a5b16"/>
  <path d="M755 428L755 462L784 445Z" fill="#fff"/>
  <text class="hSmall amberText" x="818" y="428">Real player iframe</text>
  <text class="small" x="818" y="458" text-anchor="start">youtube.com (cross-origin)</text>
<text class="small" x="818" y="480" text-anchor="start">SOP-isolated from the LMS</text>

  <path class="arrowGreen" d="M504 280C582 250 624 231 690 225" marker-end="url(#arrowGreen)"/>
  <rect class="pill" x="510" y="219" width="152" height="34" rx="17"/>
  <text class="pillText" x="586" y="241" text-anchor="middle">postMessage</text>
  <text class="small" x="586" y="304" text-anchor="middle">provider URL</text>
<text class="small" x="586" y="325" text-anchor="middle">+ geometry</text>

  <path class="arrowBlue" d="M876 322V386" marker-end="url(#arrowBlue)"/>
  <text class="small blueText" x="897" y="360">promote + overlay</text>

  <path class="arrowGray" d="M700 456C620 490 520 484 460 426" marker-end="url(#arrowGray)"/>
  <rect class="pill" x="502" y="462" width="136" height="34" rx="17"/><text class="pillText" x="570" y="484" text-anchor="middle">same geometry</text>

  <rect class="panel" x="72" y="568" width="1056" height="34" rx="7"/>
  <text class="small" x="600" y="591" text-anchor="middle">The promoted player is cross-origin: it cannot read LMS state under SOP.</text>
</svg>